name: Python application tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install system dependencies for headless PySide6 tests
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils libdbus-1-dev libglib2.0-dev libegl1 libgl1 libxcb-cursor0 libxcb-shape0
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-qt pytest-mock pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with ruff
      run: |
        ruff check src/ tests/ --select E,F,W --ignore E501,E402
    - name: Run tests with coverage
      run: |
        export PYTHONPATH=src
        xvfb-run --auto-servernum pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml
